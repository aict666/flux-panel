name: Build and Push Images Based on Version

# 在这里定义统一版本号
env:
  VERSION: "2026.04.3"
  IMAGE_PREFIX: "ghcr.io/aict666"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    name: Check Version and Decide Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
      should_build: ${{ steps.check-tag.outputs.should_build }}
      should_build_gost: ${{ steps.check-tag.outputs.should_build_gost }}
      tag_exists: ${{ steps.check-tag.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Display version
        run: |
          echo "Current version: ${{ env.VERSION }}"

      - name: Verify release version consistency
        run: |
          bash tests/release_version_consistency_test.sh

      - name: Check if tag exists and detect changes
        id: check-tag
        run: |
          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.VERSION }} already exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            
            TAG_COMMIT=$(git rev-list -n 1 "${{ env.VERSION }}")
            HEAD_COMMIT=$(git rev-parse HEAD)
            echo "Tag commit: $TAG_COMMIT"
            echo "Current HEAD: $HEAD_COMMIT"

            if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
              echo "HEAD matches tag, skip frontend/backend image rebuild"
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "HEAD is newer than tag, rebuild frontend/backend images for existing version"
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
            
            if git diff --quiet --ignore-all-space --ignore-blank-lines $TAG_COMMIT HEAD -- go-gost/ 2>/dev/null; then
              echo "✅ GOST files unchanged since tag (no content changes)"
              echo "should_build_gost=false" >> $GITHUB_OUTPUT
            else
              # 显示差异以便调试
              echo "🔄 Detected changes in go-gost directory:"
              git diff --stat $TAG_COMMIT HEAD -- go-gost/ || true
              echo "should_build_gost=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Tag ${{ env.VERSION }} does not exist, will build all components"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_gost=true" >> $GITHUB_OUTPUT
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

  build-gost:
    name: Build & Compress GOST Binary
    needs: check-version
    if: needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install UPX
        run: |
          wget https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_linux.tar.xz
          tar -xf upx-4.2.1-amd64_linux.tar.xz
          sudo mv upx-4.2.1-amd64_linux/upx /usr/local/bin/
          rm -rf upx-4.2.1-amd64_linux*

      - name: Build GOST binary (AMD64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gost-amd64

      - name: Build GOST binary (ARM64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o gost-arm64

      - name: Compress with UPX (AMD64)
        working-directory: ./go-gost
        run: |
          upx --best --lzma gost-amd64

      - name: Compress with UPX (ARM64)
        working-directory: ./go-gost
        run: |
          upx --best --lzma gost-arm64

      - name: Upload GOST AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./go-gost/gost-amd64

      - name: Upload GOST ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./go-gost/gost-arm64

  build-vite:
    name: Build & Push Vite Frontend
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Vite Docker images
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t ${{ env.IMAGE_PREFIX }}/vite-frontend:latest \
            -t ${{ env.IMAGE_PREFIX }}/vite-frontend:${VERSION} \
            ./vite-frontend

  build-java:
    name: Build & Push Spring Boot Backend
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK and Maven
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Java JAR
        working-directory: ./springboot-backend
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Java Docker images
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t ${{ env.IMAGE_PREFIX }}/springboot-backend:latest \
            -t ${{ env.IMAGE_PREFIX }}/springboot-backend:${VERSION} \
            ./springboot-backend

  create-release:
    name: Create Or Update Release
    needs: [check-version, build-gost, build-vite, build-java]
    if: >
      always() &&
      needs.check-version.outputs.should_build == 'true' &&
      needs.build-vite.result == 'success' &&
      needs.build-java.result == 'success' &&
      (needs.build-gost.result == 'success' || needs.build-gost.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download GOST AMD64 binary
        if: needs.check-version.outputs.should_build_gost == 'true'
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        if: needs.check-version.outputs.should_build_gost == 'true'
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Rename binaries
        if: needs.check-version.outputs.should_build_gost == 'true'
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG_EXISTS="${{ needs.check-version.outputs.tag_exists }}"
          
          if [[ "$TAG_EXISTS" != "true" ]]; then
            git tag "${VERSION}" ${{ github.sha }}
            git push origin "${VERSION}"
            RELEASE_SHA="${{ github.sha }}"
          else
            git fetch --force --tags origin
            RELEASE_SHA="$(git rev-list -n 1 "refs/tags/${VERSION}")"
          fi
          
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$RELEASE_SHA")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an" "$RELEASE_SHA")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai" "$RELEASE_SHA")
          
          RELEASE_NOTES="## 📝 Commit Information
          - **Message**: ${COMMIT_MSG}
          - **Author**: ${COMMIT_AUTHOR}
          - **Date**: ${COMMIT_DATE}
          - **Commit**: [\`${RELEASE_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${RELEASE_SHA})"

          if gh release view "${VERSION}" --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release edit "${VERSION}" \
              --title "Release ${VERSION}" \
              --notes "$RELEASE_NOTES" \
              --repo ${{ github.repository }}
          else
            gh release create "${VERSION}" \
              --title "Release ${VERSION}" \
              --notes "$RELEASE_NOTES" \
              --repo ${{ github.repository }}
          fi
          
          if [[ -f ./artifacts/gost-amd64 ]]; then
            echo "📤 上传 GOST 二进制文件..."
            gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
            gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber
          fi
          
          echo "📤 上传安装脚本..."
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber

          echo "📤 上传 Docker Compose 配置文件..."
          gh release upload "${VERSION}" ./docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./docker-compose-v6.yml --clobber
          
          echo "✅ 所有文件已上传到 Release ${VERSION}"

  update-release-gost:
    name: Update GOST Binaries in Release
    needs: [check-version, build-gost]
    if: needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Rename binaries
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64

      - name: Update GOST binaries in Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          echo "🔄 更新 Release ${VERSION} 中的 GOST 二进制文件..."
          
          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber
          
          echo "✅ GOST 二进制文件更新完成！"
          echo "ℹ️ Docker 镜像未重新构建"

  update-release-files:
    name: Update Release Files Only
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true' && needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Update Release Files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          echo "📤 更新 Release ${VERSION} 中的脚本和配置文件..."
          
          # 上传安装脚本（覆盖）
          echo "📤 更新安装脚本..."
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber
          
          # 上传 Docker Compose 配置文件（覆盖）
          echo "📤 更新 Docker Compose 配置文件..."
          gh release upload "${VERSION}" ./docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./docker-compose-v6.yml --clobber
          
          echo "✅ 文件更新完成！Release ${VERSION} 中的脚本和配置已更新"
          echo "ℹ️ Docker 镜像和 GOST 二进制未重新构建"
