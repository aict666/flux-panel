spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flux_panel}
    username: ${DB_USER:flux_panel}
    password: ${DB_PASSWORD:flux_panel}
    hikari:
      max-lifetime: 500000
      connection-timeout: 30000
      idle-timeout: 600000
      max-pool-size: 20
      minimum-idle: 5
      pool-name: HikariCP
      auto-commit: true
  sql:
    init:
      mode: always
      continue-on-error: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 6365
  tomcat:
    uri-encoding: UTF-8
    max-thread: 800
    max-connections: 2000
  shutdown: graceful
  error:
    whitelabel:
      enabled: false
    include-message: always
    include-binding-errors: always

mybatis-plus:
  mapper-locations: classpath*:/mapper/**Mapper.xml
#  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt-secret: ${JWT_SECRET}
log-dir: ${LOG_DIR}

captcha:
  init-default-resource: true
  secondary:
    enabled: true
    expire: 120000

app:
  migration:
    mode: ${APP_MIGRATION_MODE:}
    sqlite-path: ${SQLITE_IMPORT_PATH:}
    exit-after-run: ${APP_MIGRATION_EXIT_AFTER_RUN:false}
